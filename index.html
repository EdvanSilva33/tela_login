<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Exclusivo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="background-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo-area">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22ZM12 16.5C14.4853 16.5 16.5 14.4853 16.5 12C16.5 9.51472 14.4853 7.5 12 7.5C9.51472 7.5 7.5 9.51472 7.5 12C7.5 14.4853 9.51472 16.5 12 16.5Z" fill="url(#paint0_linear)"/>
                    <defs>
                        <linearGradient id="paint0_linear" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#4F46E5"/>
                            <stop offset="1" stop-color="#EC4899"/>
                        </linearGradient>
                    </defs>
                </svg>
                <h2>Bem-vindo de volta</h2>
                <p>Faça login para continuar</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div class="options-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Lembrar-me
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div class="divider">
                <span>ou continue com</span>
            </div>

            <div class="google-login-wrapper">
                <!-- Fallback Button for visual presentation se o Client ID não for providenciado -->
                <button id="customGoogleBtn" class="btn-google" type="button" style="display:none;">
                    <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                        <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
                            <path fill="#4285F4" d="M -3.264,51.509 C -3.264,50.719 -3.334,49.969 -3.454,49.239 L -14.754,49.239 L -14.754,53.749 L -8.284,53.749 C -8.574,55.229 -9.424,56.479 -10.684,57.329 L -10.684,60.329 L -6.824,60.329 C -4.564,58.239 -3.264,55.159 -3.264,51.509 Z"/>
                            <path fill="#34A853" d="M -14.754,63.239 C -11.514,63.239 -8.804,62.159 -6.824,60.329 L -10.684,57.329 C -11.764,58.049 -13.134,58.489 -14.754,58.489 C -17.884,58.489 -20.534,56.379 -21.464,53.529 L -25.464,53.529 L -25.464,56.619 C -23.494,60.539 -19.444,63.239 -14.754,63.239 Z"/>
                            <path fill="#FBBC05" d="M -21.464,53.529 C -21.734,52.729 -21.864,51.879 -21.864,51.029 C -21.864,50.179 -21.724,49.329 -21.464,48.529 L -21.464,45.439 L -25.464,45.439 C -26.284,47.059 -26.754,48.969 -26.754,51.029 C -26.754,53.089 -26.284,54.999 -25.464,56.619 L -21.464,53.529 Z"/>
                            <path fill="#EA4335" d="M -14.754,43.569 C -12.984,43.569 -11.404,44.179 -10.154,45.369 L -6.724,41.939 C -8.804,39.999 -11.514,38.819 -14.754,38.819 C -19.444,38.819 -23.494,41.519 -25.464,45.439 L -21.464,48.529 C -20.534,45.679 -17.884,43.569 -14.754,43.569 Z"/>
                        </g>
                    </svg>
                    <span>Entrar com Google</span>
                </button>
                
                <!-- Divs Reais do Google para integração quando houver Client ID -->
                <div id="g_id_onload"
                     data-client_id="24318605718-sbtikiq99k8hg1eg30hagehr08gb805k.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="pill"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left"
                     style="display:block;  margin: 0 auto; width: 100%;">
                </div>
            </div>

            <p class="signup-prompt">
                Não tem uma conta? <a href="#">Cadastre-se</a>
            </p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
